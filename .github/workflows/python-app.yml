name: Generate summaries

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: python -m pip install --upgrade pip setuptools wheel markdown-analysis anthropic

    - name: Install docdigest
      run: python -m pip install .
      working-directory: ${{ github.workspace }}

    - name: Configure Git settings
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run the program
      id: run_program
      run: |
        docdigest --automation

    - name: Create pull request
      uses: peter-evans/create-pull-request@v4
      if: ${{ steps.run_program.outcome == 'success' }}
      with:
        title: 'infra: Update doc summaries'
        branch: docdigest-auto-updates
        base: main
        labels: bot
