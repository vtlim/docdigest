name: Generate summaries

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: python -m pip install --upgrade pip setuptools wheel markdown-analysis anthropic
    - name: Install docdigest
      run: python -m pip install ./docdigest
      working-directory: ${{ github.workspace }}
    - name: Run the program
      run: |
        docdigest
