name: Generate summaries

on:
  workflow_dispatch:
  schedule:
    # run on 8:00 AM UTC (00:00 PT), any day, any month, 3rd day of week (Wed)
    - cron: '0 8 * * 3'

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Check out repository with full history
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.13
      uses: actions/setup-python@v3
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: python -m pip install --upgrade pip setuptools wheel markdown-analysis anthropic

    - name: Install docdigest
      run: python -m pip install .
      working-directory: ${{ github.workspace }}

    - name: Configure Git settings
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run the program
      id: run_program
      run: |
        docdigest --automation --llm claude
      env:
        ANTHROPIC_API_KEY: ${{ vars.ANTHROPIC_API_KEY }}

    - name: Create pull request
      if: steps.run_program.outputs.create_pr != 'false'
      run: |
        gh pr create -B main -H bot-summaries --title "infra: Update doc summaries" --body "Created by GitHub Actions workflow"
      env:
        GH_TOKEN: ${{ github.token }}
