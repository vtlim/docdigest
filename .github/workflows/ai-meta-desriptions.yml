name: Generate meta descriptions

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Enter your pull request number (e.g., 123)'
        required: true
        type: number

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: 'refs/pull/${{ github.event.inputs.pr_number }}/head'

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: python -m pip install --upgrade pip setuptools wheel markdown-analysis anthropic

    - name: Install docdigest
      run: python -m pip install .
      working-directory: ${{ github.workspace }}

    - name: Configure Git settings
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Run the program
      id: run_program
      run: |
        docdigest --meta --automation
      env:
        ANTHROPIC_API_KEY: ${{ vars.ANTHROPIC_API_KEY }}
        GITHUB_TOKEN: ${{ github.token }}
